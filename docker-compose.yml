services:
  db:
    build:
      context: ./db
    container_name: student-access-db
    environment:
      POSTGRES_DB: kmk
      POSTGRES_USER: kmk_app
      POSTGRES_PASSWORD: kmk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ./app
    container_name: student-access-app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - db
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    build:
      context: ./nginx
    container_name: student-access-nginx
    depends_on:
      - app
    ports:
      - "8080:81"

volumes:
  postgres_data: